<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Happy Birthday | Kartu Ucapan Aesthetic + Kembang Api Meriah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #fef5e8;
            --bg-gradient-end: #ffe4f0;
            --card-bg: rgba(255, 255, 255, 0.94);
            --primary-pink: #ff9eb5;
            --accent-gold: #f7c35c;
            --shadow-lg: 0 20px 35px -10px rgba(0, 0, 0, 0.25);
            --border-radius-card: 2rem;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            position: relative;
            transition: background 0.4s ease;
        }

        /* Floating hearts dekorasi */
        .floating-heart {
            position: fixed;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 0;
            opacity: 0.25;
            animation: floatAnim 14s infinite ease-in-out;
        }

        @keyframes floatAnim {
            0% { transform: translateY(0vh) rotate(0deg); opacity: 0.2; }
            50% { transform: translateY(-18vh) rotate(6deg); opacity: 0.4; }
            100% { transform: translateY(0vh) rotate(0deg); opacity: 0.2; }
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .portal-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius-card);
            box-shadow: var(--shadow-lg);
            padding: 2rem;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,240,0.7);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .btn {
            border: none;
            background: var(--primary-pink);
            color: white;
            padding: 0.7rem 1.6rem;
            border-radius: 3rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 6px 14px rgba(255, 158, 181, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #ff8aa4;
            box-shadow: 0 8px 18px rgba(255, 158, 181, 0.4);
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #ffe0e7;
            border-radius: 1.5rem;
            background: white;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--primary-pink);
            box-shadow: 0 0 0 3px rgba(255,158,181,0.2);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        .bg-option {
            display: inline-block;
            width: 70px;
            height: 70px;
            border-radius: 1rem;
            margin: 0.3rem;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.1s;
        }

        .bg-option.selected {
            border-color: var(--accent-gold);
            transform: scale(1.02);
        }

        /* Receiver - tata letak rapi */
        .receiver-greeting {
            text-align: center;
            margin-bottom: 1rem;
        }
        .sender-badge {
            display: inline-block;
            background: rgba(255,235,220,0.8);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        .title-area {
            min-height: 90px;
            margin-bottom: 0.5rem;
        }
        .typing-title {
            font-size: 1.9rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            color: #2d2a2e;
        }
        .cake-container {
            display: flex;
            justify-content: center;
            margin: 0.5rem 0 0.5rem;
        }
        .birthday-cake {
            position: relative;
            width: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            margin: 0 auto;
        }
        .cake-base {
            width: 220px;
            height: 70px;
            background: #e3aa7a;
            border-radius: 20px 20px 30px 30px;
            box-shadow: 0 8px 0 #b4622a;
            position: relative;
            z-index: 2;
        }
        .cake-middle {
            width: 190px;
            height: 60px;
            background: #f5c396;
            border-radius: 18px 18px 20px 20px;
            margin-bottom: -12px;
            box-shadow: 0 5px 0 #d48c54;
            z-index: 3;
        }
        .cake-top {
            width: 160px;
            height: 50px;
            background: #ffdead;
            border-radius: 18px 18px 12px 12px;
            margin-bottom: -8px;
            box-shadow: 0 4px 0 #e0a36f;
            z-index: 4;
        }
        .icing {
            position: absolute;
            top: -12px;
            left: 0;
            width: 100%;
            height: 20px;
            background: repeating-linear-gradient(45deg, #fff8e7, #fff8e7 12px, #ffe0b5 12px, #ffe0b5 24px);
            border-radius: 30px;
            z-index: 5;
        }
        .candle-holder {
            position: absolute;
            top: -48px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .candle {
            width: 20px;
            height: 48px;
            background: linear-gradient(145deg, #f9f2d9, #ffe0a3);
            border-radius: 12px 12px 5px 5px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            position: relative;
        }
        .flame {
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 30px;
            background: radial-gradient(circle, #ffb347, #ff6600);
            border-radius: 50% 50% 35% 35%;
            animation: flicker 0.12s infinite alternate;
            box-shadow: 0 0 10px #ffaa33;
        }
        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.95; }
            100% { transform: translateX(-50%) scale(1.08, 0.92); opacity: 1; }
        }
        .flame.extinguished {
            background: #888;
            box-shadow: none;
            animation: none;
            height: 12px;
            top: -12px;
            width: 12px;
            opacity: 0.6;
        }
        .smoke-effect {
            position: absolute;
            top: -40px;
            left: 50%;
            width: 24px;
            height: 24px;
            background: rgba(180,180,180,0.5);
            border-radius: 50%;
            animation: smokeFloat 0.9s ease-out forwards;
            pointer-events: none;
        }
        @keyframes smokeFloat {
            0% { transform: translateX(-50%) scale(0.4); opacity: 0.7; }
            100% { transform: translateX(-50%) translateY(-45px) scale(2); opacity: 0; }
        }
        .cake-deco {
            position: absolute;
            bottom: 8px;
            right: 15px;
            font-size: 1.2rem;
            pointer-events: none;
        }
        .action-blow {
            text-align: center;
            margin: 0.5rem 0 1rem;
        }
        .birthday-message {
            background: #fff8f2;
            padding: 1.4rem;
            border-radius: 1.6rem;
            margin: 1rem 0;
            border-left: 7px solid var(--accent-gold);
            font-size: 1.05rem;
            line-height: 1.45;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }
        .extra-gift {
            background: #fff5ec;
            border-radius: 2rem;
            padding: 0.8rem 1rem;
            text-align: center;
            margin: 0.8rem 0;
        }
        .footer-copyright {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #b28b7a;
            border-top: 1px solid rgba(0,0,0,0.08);
            padding-top: 1rem;
        }
        .music-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            z-index: 100;
            pointer-events: none;
            font-weight: 500;
        }
        .balloon {
            position: absolute;
            bottom: -120px;
            pointer-events: none;
            animation: riseBalloon 7s infinite ease-in;
            font-size: 2rem;
            z-index: 6;
        }
        @keyframes riseBalloon {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; bottom: -120px; }
            100% { transform: translateY(-130vh) rotate(12deg); opacity: 0; bottom: 100%; }
        }
        @media (max-width: 550px) {
            .portal-card { padding: 1.2rem; }
            .birthday-cake { transform: scale(0.9); }
            .typing-title { font-size: 1.5rem; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .portal-card {
            animation: fadeInUp 0.5s ease;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: default;
            transform: none;
        }
        .share-link {
            background: #f0ebe4;
            padding: 1rem;
            border-radius: 1.5rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="app-container" id="appRoot"></div>
<div class="music-hint" id="musicHint">🎵 Sentuh layar untuk memulai musik & keajaiban 🎵</div>

<script>
    (function(){
        // ========== GLOBAL ==========
        let audioCtx = null;
        let musicAllowed = false;
        let melodyInterval = null;
        let isReceiverPage = false;
        let balloonTimer = null;
        let cleanupReceiver = null;
        
        // Background presets
        const bgOptions = [
            { name: 'Soft Pink', value: 'linear-gradient(135deg, #ffe4ec, #ffd9e4)' },
            { name: 'Lavender Dream', value: 'linear-gradient(135deg, #e8def0, #f9eef7)' },
            { name: 'Golden Hour', value: 'linear-gradient(135deg, #fff0db, #ffe0b5)' },
            { name: 'Minty Fresh', value: 'linear-gradient(135deg, #daf4f0, #c8e9e0)' },
            { name: 'Peach Bliss', value: 'linear-gradient(135deg, #ffe2ce, #ffcdb0)' },
            { name: 'Starry Night', value: 'linear-gradient(135deg, #1f2b3c, #2a3f54)' },
        ];
        
        let creatorData = {
            creatorName: "Sarah",
            receiverName: "Andini",
            birthdayDate: "2026-01-15",
            message: "Selamat ulang tahun, sahabatku! Semoga semua impianmu terwujud. Kamu luar biasa 🎂✨",
            selectedBgIndex: 0,
            extraGift: "💖 Love & Happiness 💖"
        };
        
        function generateShareableHash(dataObj) { return btoa(encodeURIComponent(JSON.stringify(dataObj))); }
        function parseHashToData(hash) {
            if(!hash) return null;
            try { return JSON.parse(decodeURIComponent(atob(hash))); } catch(e){ return null; }
        }
        
        function renderApp() {
            const hash = window.location.hash.substring(1);
            if (hash && hash.startsWith("card_")) {
                const cardData = parseHashToData(hash.substring(5));
                if (cardData && cardData.receiverName) {
                    isReceiverPage = true;
                    renderReceiverView(cardData);
                    return;
                }
            }
            isReceiverPage = false;
            renderCreatorView();
        }
        
        // ========== CREATOR (Portal Pembuat Kartu) ==========
        function renderCreatorView() {
            const appDiv = document.getElementById('appRoot');
            appDiv.innerHTML = `
                <div class="portal-card">
                    <div style="text-align:center; margin-bottom:1.5rem;">
                        <i class="fas fa-gift" style="font-size:3rem; color:#ff9eb5;"></i>
                        <h1 style="font-size:2rem;">✨ Buat Kartu Ucapan ✨</h1>
                        <p>Personalisasi ucapan birthday spesial</p>
                    </div>
                    <form id="creatorForm">
                        <div class="grid-2">
                            <div class="form-group"><label><i class="fas fa-user-edit"></i> Nama Pembuat</label><input type="text" id="creatorName" value="${escapeHtml(creatorData.creatorName)}" required></div>
                            <div class="form-group"><label><i class="fas fa-smile"></i> Nama Penerima</label><input type="text" id="receiverName" value="${escapeHtml(creatorData.receiverName)}" required></div>
                        </div>
                        <div class="form-group"><label><i class="fas fa-calendar-alt"></i> Tanggal Ulang Tahun</label><input type="date" id="birthdayDate" value="${creatorData.birthdayDate}"></div>
                        <div class="form-group"><label><i class="fas fa-comment-dots"></i> Pesan Ucapan</label><textarea rows="4" id="messageText">${escapeHtml(creatorData.message)}</textarea></div>
                        <div class="form-group"><label><i class="fas fa-palette"></i> Pilih Tema Background</label><div id="bgSelector" style="display:flex; flex-wrap:wrap; gap:8px;"></div></div>
                        <div class="form-group"><label><i class="fas fa-star"></i> Tambahan Ucapan</label><input type="text" id="extraGift" value="${escapeHtml(creatorData.extraGift)}"></div>
                        <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:1rem;"><button type="button" id="previewBtn" class="btn btn-outline"><i class="fas fa-eye"></i> Pratinjau</button><button type="submit" class="btn"><i class="fas fa-link"></i> Buat & Salin Link</button></div>
                    </form>
                    <div id="shareResult" style="margin-top:1.5rem;"></div>
                    <div class="footer-copyright"><i class="far fa-copyright"></i> SIAHAAN 22 — Birthday Magic</div>
                </div>
            `;
            const bgContainer = document.getElementById('bgSelector');
            bgOptions.forEach((opt, idx) => {
                const divColor = document.createElement('div');
                divColor.className = `bg-option ${creatorData.selectedBgIndex === idx ? 'selected' : ''}`;
                divColor.style.background = opt.value;
                divColor.addEventListener('click', () => {
                    document.querySelectorAll('.bg-option').forEach(el => el.classList.remove('selected'));
                    divColor.classList.add('selected');
                    creatorData.selectedBgIndex = idx;
                });
                bgContainer.appendChild(divColor);
            });
            document.getElementById('previewBtn').addEventListener('click', () => { showPreviewModal(gatherFormData()); });
            document.getElementById('creatorForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const fd = gatherFormData();
                const hashData = { ...fd, bgIndex: creatorData.selectedBgIndex, timestamp: Date.now() };
                const link = window.location.href.split('#')[0] + `#card_${generateShareableHash(hashData)}`;
                document.getElementById('shareResult').innerHTML = `<div class="share-link"><i class="fas fa-link"></i> Link Kartu:<br><input type="text" readonly value="${link}" id="copyLink" style="width:100%; margin:8px 0;"><button id="copyBtn" class="btn">Salin Link</button></div>`;
                document.getElementById('copyBtn')?.addEventListener('click', () => { document.getElementById('copyLink').select(); document.execCommand('copy'); alert('✅ Link tersalin! Bagikan ke penerima.'); });
            });
        }
        
        function gatherFormData() {
            return {
                creatorName: document.getElementById('creatorName').value.trim() || "Pengirim",
                receiverName: document.getElementById('receiverName').value.trim() || "Sahabat",
                birthdayDate: document.getElementById('birthdayDate').value,
                message: document.getElementById('messageText').value.trim() || "Selamat ulang tahun! 🎉",
                extraGift: document.getElementById('extraGift').value.trim() || "🎁 Best Wishes",
                bgTheme: bgOptions[creatorData.selectedBgIndex]?.value || bgOptions[0].value,
                bgIndex: creatorData.selectedBgIndex
            };
        }
        
        function showPreviewModal(data) {
            const modal = document.createElement('div');
            modal.id = 'previewModal';
            modal.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); z-index:1000; display:flex; align-items:center; justify-content:center;';
            modal.innerHTML = `<div style="max-width:450px; background:white; border-radius:2rem; padding:2rem; text-align:center;"><h3>✨ Pratinjau ✨</h3><div style="background:${data.bgTheme}; border-radius:1rem; padding:1rem; margin:1rem 0;"><p><strong>Dari:</strong> ${escapeHtml(data.creatorName)}</p><p>${escapeHtml(data.message)}</p><p>${escapeHtml(data.extraGift)}</p></div><button id="closeModalBtn" class="btn">Tutup</button></div>`;
            document.body.appendChild(modal);
            document.getElementById('closeModalBtn').addEventListener('click', () => modal.remove());
        }
        
        // ========== RECEIVER - KEMBANG API DIPERKUAT ==========
        let candleLit = true;
        let titleTypingInterval = null;
        
        function renderReceiverView(cardData) {
            // Set background
            document.body.style.background = cardData.bgTheme || bgOptions[cardData.bgIndex]?.value || bgOptions[0].value;
            const appDiv = document.getElementById('appRoot');
            appDiv.innerHTML = `
                <div class="portal-card">
                    <div class="receiver-greeting">
                        <div class="sender-badge">
                            <i class="fas fa-heart" style="color:#ff9eb5;"></i> Dari: ${escapeHtml(cardData.creatorName)} <i class="fas fa-heart" style="color:#ff9eb5;"></i>
                        </div>
                        <div class="title-area" id="titleArea"></div>
                    </div>
                    
                    <div class="cake-container">
                        <div class="birthday-cake" id="interactiveCake">
                            <div class="cake-top"><div class="icing"></div></div>
                            <div class="cake-middle"></div>
                            <div class="cake-base"></div>
                            <div class="candle-holder" id="candleHolder">
                                <div class="candle">
                                    <div class="flame" id="candleFlame"></div>
                                </div>
                            </div>
                            <div class="cake-deco">🎀✨</div>
                        </div>
                    </div>
                    
                    <div class="action-blow">
                        <button id="blowCandleAction" class="btn" style="background:#ffaa66;"><i class="fas fa-wind"></i> Tiup Lilin 🕯️</button>
                        <p id="blowMsg" style="margin-top: 5px; font-size:0.8rem; font-style:italic;"></p>
                    </div>
                    
                    <div class="birthday-message">
                        <i class="fas fa-quote-left" style="color:#f4c542; margin-right:6px;"></i> 
                        <span id="messageTypingSpan"></span>
                    </div>
                    
                    <div class="extra-gift">
                        <i class="fas fa-gem"></i> ${escapeHtml(cardData.extraGift)} <i class="fas fa-gem"></i>
                    </div>
                    
                    ${cardData.birthdayDate ? `<p style="text-align:center; font-size:0.85rem; margin-top:5px;"><i class="far fa-calendar-alt"></i> Istimewa di: ${cardData.birthdayDate}</p>` : ''}
                    
                    <div style="display: flex; justify-content: center; margin: 1rem 0 0;">
                        <button id="fireworkBtn" class="btn"><i class="fas fa-star"></i> Kembang Api 🎆</button>
                    </div>
                    
                    <div class="footer-copyright"><i class="far fa-copyright"></i> SIAHAAN 22 — Birthday Wishes</div>
                </div>
            `;
            
            // Typing title
            const titleArea = document.getElementById('titleArea');
            const fullTitle = `🎂 Happy Birthday, ${cardData.receiverName}! 🎂`;
            titleArea.innerHTML = `<h1 class="typing-title typing-text" id="receiverTitle" style="font-size:1.9rem;"></h1>`;
            const titleEl = document.getElementById('receiverTitle');
            let tIdx = 0;
            if (titleTypingInterval) clearInterval(titleTypingInterval);
            titleTypingInterval = setInterval(() => {
                if (tIdx < fullTitle.length) {
                    titleEl.innerHTML += fullTitle[tIdx];
                    tIdx++;
                } else {
                    clearInterval(titleTypingInterval);
                    titleEl.style.borderRight = 'none';
                }
            }, 55);
            
            // Typing message
            const msgSpan = document.getElementById('messageTypingSpan');
            const originalMsg = cardData.message;
            msgSpan.innerHTML = '';
            let mIdx = 0;
            const msgInterval = setInterval(() => {
                if (mIdx < originalMsg.length) {
                    msgSpan.innerHTML += originalMsg[mIdx];
                    mIdx++;
                } else clearInterval(msgInterval);
            }, 38);
            
            // === LILIN ===
            const flame = document.getElementById('candleFlame');
            const blowBtn = document.getElementById('blowCandleAction');
            const blowMsgDiv = document.getElementById('blowMsg');
            const cakeDiv = document.getElementById('interactiveCake');
            
            function extinguishFlame() {
                if (!candleLit) return;
                candleLit = false;
                flame.classList.add('extinguished');
                const candleElement = document.querySelector('.candle');
                const smoke = document.createElement('div');
                smoke.className = 'smoke-effect';
                candleElement.appendChild(smoke);
                setTimeout(() => smoke.remove(), 900);
                canvasConfetti({ particleCount: 50, spread: 55, origin: { y: 0.6, x: 0.5 }, colors: ['#ffd966', '#ffffff'] });
                blowMsgDiv.innerHTML = '✨ Lilin berhasil ditiup! Selamat Ulang Tahun ✨';
                blowBtn.disabled = true;
                blowBtn.style.opacity = '0.6';
                for(let i=0;i<10;i++) spawnBalloon();
                canvasConfetti({ particleCount: 180, spread: 100, origin: { y: 0.6 }, startVelocity: 20, colors: ['#ff9eb5','#f4c542','#ffb347'] });
            }
            
            blowBtn.addEventListener('click', extinguishFlame);
            cakeDiv.addEventListener('click', extinguishFlame);
            
            // === KEMBANG API - DIPERKUAT (PASTI JALAN) ===
            const fireworksBtn = document.getElementById('fireworkBtn');
            
            // Fungsi untuk memicu confetti dengan berbagai gaya
            function triggerAwesomeFireworks() {
                // Ledakan besar pertama
                canvasConfetti({
                    particleCount: 220,
                    spread: 120,
                    origin: { y: 0.5 },
                    startVelocity: 28,
                    colors: ['#ff5e7e', '#ffb347', '#7de2d1', '#f3c683', '#ff9eb5', '#f7c35c'],
                    decay: 0.9,
                    ticks: 200
                });
                // Ledakan kedua setelah 100ms
                setTimeout(() => {
                    canvasConfetti({
                        particleCount: 150,
                        spread: 90,
                        origin: { y: 0.4, x: 0.3 },
                        startVelocity: 22,
                        colors: ['#ffaa66', '#ff6680', '#a5f0e0']
                    });
                    canvasConfetti({
                        particleCount: 150,
                        spread: 90,
                        origin: { y: 0.5, x: 0.7 },
                        startVelocity: 22,
                        colors: ['#ffd966', '#ff9eb5', '#88d8b0']
                    });
                }, 120);
                // Ledakan ketiga (kejutan)
                setTimeout(() => {
                    canvasConfetti({
                        particleCount: 300,
                        spread: 70,
                        origin: { y: 0.6, x: 0.5 },
                        startVelocity: 18,
                        colors: ['#ffb347', '#ff5e7e', '#ffffff']
                    });
                }, 300);
            }
            
            // Pasang event listener dengan pengecekan
            if (fireworksBtn) {
                // Hapus listener lama jika ada (mencegah duplikasi)
                const newBtn = fireworksBtn.cloneNode(true);
                fireworksBtn.parentNode.replaceChild(newBtn, fireworksBtn);
                const finalBtn = document.getElementById('fireworkBtn');
                finalBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    triggerAwesomeFireworks();
                    // tambah balon
                    for(let i=0;i<8;i++) setTimeout(() => spawnBalloon(), i*80);
                });
            }
            
            // === BALON OTOMATIS ===
            function spawnBalloon() {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                const icons = ['🎈','🎈','🎀','🎉','🎂','🕯️','✨','🎁','🎈'];
                balloon.innerHTML = icons[Math.floor(Math.random()*icons.length)];
                balloon.style.left = Math.random() * 100 + '%';
                balloon.style.animationDuration = 5 + Math.random() * 6 + 's';
                balloon.style.fontSize = 1.8 + Math.random() * 1.2 + 'rem';
                document.body.appendChild(balloon);
                setTimeout(() => balloon.remove(), 9000);
            }
            if (balloonTimer) clearInterval(balloonTimer);
            balloonTimer = setInterval(() => { if(isReceiverPage) spawnBalloon(); }, 2000);
            
            // === MUSIK OTOMATIS SETELAH INTERAKSI ===
            const musicHint = document.getElementById('musicHint');
            let musicStarted = false;
            async function startMusic() {
                if (musicStarted) return;
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                musicStarted = true;
                musicAllowed = true;
                playHappyMelody();
                if (melodyInterval) clearInterval(melodyInterval);
                melodyInterval = setInterval(() => {
                    if (musicAllowed && audioCtx && audioCtx.state !== 'closed') playHappyMelody();
                }, 19500);
                if (musicHint) musicHint.style.opacity = '0';
            }
            function playHappyMelody() {
                if (!audioCtx || audioCtx.state !== 'running') return;
                const now = audioCtx.currentTime;
                const notes = [
                    { freq: 261.63, duration: 0.4 },{ freq: 261.63, duration: 0.4 },{ freq: 293.66, duration: 0.8 },
                    { freq: 261.63, duration: 0.8 },{ freq: 349.23, duration: 0.8 },{ freq: 329.63, duration: 1.6 },
                    { freq: 261.63, duration: 0.4 },{ freq: 261.63, duration: 0.4 },{ freq: 293.66, duration: 0.8 },
                    { freq: 261.63, duration: 0.8 },{ freq: 392.00, duration: 0.8 },{ freq: 349.23, duration: 1.6 },
                    { freq: 261.63, duration: 0.4 },{ freq: 261.63, duration: 0.4 },{ freq: 523.25, duration: 0.8 },
                    { freq: 440.00, duration: 0.8 },{ freq: 349.23, duration: 0.8 },{ freq: 329.63, duration: 0.8 },
                    { freq: 293.66, duration: 1.2 },{ freq: 392.00, duration: 0.8 },{ freq: 349.23, duration: 1.6 }
                ];
                let time = now;
                notes.forEach(n => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.frequency.value = n.freq;
                    gain.gain.setValueAtTime(0.13, time);
                    gain.gain.exponentialRampToValueAtTime(0.0001, time + n.duration);
                    osc.start(time); osc.stop(time+n.duration);
                    time += n.duration;
                });
            }
            const startMusicOnInteraction = () => {
                startMusic();
                window.removeEventListener('click', startMusicOnInteraction);
                window.removeEventListener('touchstart', startMusicOnInteraction);
                if(musicHint) musicHint.style.display = 'none';
            };
            window.addEventListener('click', startMusicOnInteraction);
            window.addEventListener('touchstart', startMusicOnInteraction);
            
            cleanupReceiver = () => {
                if (balloonTimer) clearInterval(balloonTimer);
                if (titleTypingInterval) clearInterval(titleTypingInterval);
                window.removeEventListener('click', startMusicOnInteraction);
                window.removeEventListener('touchstart', startMusicOnInteraction);
            };
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, (m) => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        
        // Dekorasi floating hearts
        for(let i=0;i<30;i++) {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = ['❤️','🌸','✨','🎵','🎂','🎈'][Math.floor(Math.random()*6)];
            heart.style.left = Math.random()*100+'%';
            heart.style.top = Math.random()*100+'%';
            heart.style.animationDelay = Math.random()*12+'s';
            document.body.appendChild(heart);
        }
        
        window.addEventListener('hashchange', () => { if(cleanupReceiver) cleanupReceiver(); renderApp(); });
        renderApp();
    })();
</script>
</body>
</html>
